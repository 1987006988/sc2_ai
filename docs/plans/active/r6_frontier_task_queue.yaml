      - id: r6_task_005_run_offline_hidden_state_benchmark
        phase: phase_r6_1_offline_benchmark
        group: offline_baseline_eval
        status: blocked
        quota_risk: medium
        expected_codex_window: benchmark_window
        validation_level_required: L3
        actual_validation_level: none
        real_validation_status: not_started
        capability_validation_status: blocked_missing_materialized_holdout_inputs
        requires:
          - r6_task_004_implement_hidden_state_labelers_and_baselines
        goal: 运行 first valid offline benchmark，并建立 baseline leaderboard。
        evidence_paths:
          - research/r6_temporal_belief/data/source_manifest.yaml
          - research/r6_temporal_belief/data/dataset_manifest.json
          - research/r6_temporal_belief/eval/benchmark_config.json
          - artifacts/reports/r6_offline_benchmark/report.md
      - id: r6_checkpoint_H_offline_benchmark_gate
        phase: phase_r6_1_offline_benchmark
        group: checkpoint
        status: pending
        quota_risk: low
        expected_codex_window: review_window
        validation_level_required: L5
        actual_validation_level: none
        real_validation_status: not_started
        capability_validation_status: pending
        requires:
          - r6_task_004_implement_hidden_state_labelers_and_baselines
          - r6_task_005_run_offline_hidden_state_benchmark
        reviewed_tasks:
          - r6_task_004_implement_hidden_state_labelers_and_baselines
          - r6_task_005_run_offline_hidden_state_benchmark
        goal: 决定 benchmark 是否有效并允许进入 learned model 训练阶段。
        evidence_paths: []
        minimum_gate_passed: null
        target_gate_passed: null
        stretch_gate_status: pending
        failure_class: pending
        decision: pending
        next_allowed_task:
          on_pass: r6_task_007_implement_temporal_belief_model_and_training_loop
          on_fail_benchmark: r6_task_004_implement_hidden_state_labelers_and_baselines
          on_fail_eval: r6_task_005_run_offline_hidden_state_benchmark
  - id: phase_r6_2_temporal_model_training
    name: R6 学习型时序 belief
    objective: 训练 learned temporal belief model 并在离线 benchmark 上超过 baseline floor。
    entry_requirements:
      - r6_checkpoint_H_offline_benchmark_gate passed
    exit_checkpoint: r6_checkpoint_I_learned_belief_gate
    tasks:
      - id: r6_task_007_implement_temporal_belief_model_and_training_loop
        phase: phase_r6_2_temporal_model_training
