          on_fail_model: r6_task_007_implement_temporal_belief_model_and_training_loop
          on_fail_eval: r6_task_008_train_and_evaluate_temporal_belief_model
  - id: phase_r6_3_online_integration
    name: R6 内部在线决策集成
    objective: 用 learned temporal belief 驱动 bounded response surface，并完成三臂 internal paired evaluation。
