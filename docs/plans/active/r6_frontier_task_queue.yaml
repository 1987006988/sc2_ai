version: 1
document_status: active
queue_role: frontier_extension_queue
activation_rule: "Only active after explicit R6 activation. Core queue remains historical record after project_core_goal_reached."
source_of_truth:
  - docs/foundation/04_research_direction/r6_temporal_opponent_belief_frontier_decision.md
  - docs/plans/active/R6_FRONTIER_MASTER_EXECUTION_PLAN.md
  - docs/plans/active/phase_r6_temporal_opponent_belief_frontier.md
  - docs/experiments/r6_frontier_evaluation_protocol.md
  - docs/experiments/r6_claims_and_interview_deliverables.md
frozen_predecessor_queue: docs/plans/active/research_master_task_queue.yaml
accepted_start_state:
  core_project_status: project_core_goal_reached
  accepted_baseline_checkpoint: checkpoint_E_level1_baseline_gate
  accepted_adaptive_checkpoint: checkpoint_F_adaptive_research_gate
active_next_task: r6_task_005_run_offline_hidden_state_benchmark
execution_rules:
  checkpoint_every_n_tasks: 3
  checkpoint_failure_blocks_progress: true
  phase_skip_allowed: false
  do_not_reopen_core_queue: true
  do_not_modify_frozen_control_logic_during_eval: true
  do_not_add_second_research_feature: true
validation_levels:
  L0: documentation_and_classification_only
  L1: static_code_config_and_test_validation
  L2: dataset_and_training_pipeline_validation
  L3: offline_benchmark_or_single_real_probe
  L4: internal_batch_or_paired_evaluation
  L5: phase_decision_backed_by_L3_or_L4_evidence
  L6: external_bot_ecosystem_validation
phases:
  - id: phase_r6_0_control_dataset_contract
    name: R6 起点冻结与数据契约
    objective: 冻结 accepted baseline 和 accepted R5 adaptive comparator，建立 replay/source/split/claim 契约。
    entry_requirements:
      - project_core_goal_reached
    exit_checkpoint: r6_checkpoint_G_control_dataset_gate
    tasks:
      - id: r6_task_001_freeze_control_and_claim_contract
        phase: phase_r6_0_control_dataset_contract
        group: control_freeze
        status: completed
        quota_risk: low
        expected_codex_window: single_session
        validation_level_required: L1
        actual_validation_level: L1
        real_validation_status: not_applicable
        capability_validation_status: completed_contract_freeze
        requires: []
        data_source:
          - docs/context/current_status.md
          - docs/handoffs/latest.md
          - docs/plans/active/research_master_task_queue.yaml
          - configs/bot/baseline_playable.yaml
          - configs/bot/adaptive_research.yaml
          - artifacts/reports/checkpoints/checkpoint_E_level1_baseline_gate.md
          - artifacts/reports/checkpoints/checkpoint_F_adaptive_research_gate.md
        goal: 冻结 R6 的 baseline control、R5 comparator 和 frontier claim 边界。
        scope:
          - create control anchor manifest
          - create comparator anchor manifest
          - create R6 claim register
          - define allowed response surface and forbidden scope
        non_goals:
          - no training
          - no new SC2 run
          - no baseline logic changes
        files_likely_to_change:
          - docs/foundation/04_research_direction/r6_temporal_opponent_belief_frontier_decision.md
          - docs/experiments/r6_claims_and_interview_deliverables.md
          - artifacts/reports/r6_control_anchor/report.md
          - docs/plans/active/r6_frontier_task_queue.yaml
          - docs/handoffs/latest.md
          - docs/context/current_status.md
        verification:
          - accepted control and comparator hashes are recorded
          - R6 claim boundary is explicit
          - frozen predecessor queue remains unchanged
        done_criteria:
          - control anchor manifest exists
          - comparator anchor manifest exists
          - claim register exists
        minimum_gate:
          claim: control and comparator are frozen
          pass_condition: accepted baseline and accepted R5 adaptive are version-pinned with config hashes and evidence paths
        target_gate:
          claim: R6 claim contract is executable
          pass_condition: response surface, comparator set, and forbidden scope are fully written and consistent
        stretch_gate:
          claim: control freeze is automatable
          pass_condition: control/comparator manifest generation is scriptable
        stop_conditions:
          - accepted baseline cannot be pinned
          - comparator drift is detected
          - R6 scope is still ambiguous
        rollback_notes:
          - do not edit the frozen predecessor queue
          - if conflict appears, resolve docs before moving forward
        evidence_paths:
          - artifacts/reports/r6_control_anchor/report.md
          - docs/foundation/04_research_direction/r6_temporal_opponent_belief_frontier_decision.md
          - docs/experiments/r6_claims_and_interview_deliverables.md
        failure_class: none
      - id: r6_task_002_build_replay_data_manifest_and_split_contract
        phase: phase_r6_0_control_dataset_contract
        group: dataset_contract
        status: completed
        quota_risk: medium
        expected_codex_window: single_session_to_multi_session
        validation_level_required: L2
        actual_validation_level: L2
        real_validation_status: not_applicable
        capability_validation_status: completed_dataset_contract
        requires:
          - r6_task_001_freeze_control_and_claim_contract
        data_source:
          - research/r6_temporal_belief/data/
          - research/r6_temporal_belief/datasets/
          - public replay source manifests
          - local accepted replay manifests
        goal: 建立可复现、可追溯、泄漏受控的数据契约与 split 契约。
        scope:
          - create dataset manifest schema
          - define source provenance fields
          - define split policy and leakage checks
          - define label schema placeholders
        non_goals:
          - no model training
          - no online evaluation
          - no manual cherry-picking of replay subsets
        files_likely_to_change:
          - research/r6_temporal_belief/data/source_manifest.yaml
          - research/r6_temporal_belief/data/dataset_manifest.json
          - research/r6_temporal_belief/datasets/splits.py
          - configs/research/r6_dataset_manifest.yaml
          - configs/research/r6_label_schema.yaml
          - artifacts/reports/r6_control_anchor/report.md
          - docs/handoffs/latest.md
        verification:
          - manifest schema validates
          - split policy documents leakage constraints
          - dataset contract names every source and intended use
        done_criteria:
          - dataset manifest exists
          - split contract exists
          - leakage-check script skeleton exists
        minimum_gate:
          claim: replay data contract exists
          pass_condition: every source is versioned and split rules are explicit
        target_gate:
          claim: benchmark setup can start safely
          pass_condition: train/val/test leakage policy is script-checkable and label schema draft is frozen
        stretch_gate:
          claim: dataset integrity checks are partially automated
          pass_condition: at least one leakage validation command exists
        stop_conditions:
          - source provenance is missing
          - split contract is ambiguous
          - local and public sources are mixed without boundary
        rollback_notes:
          - keep raw data outside git if required
          - only version manifests and checks
        evidence_paths:
          - research/r6_temporal_belief/data/source_manifest.yaml
          - research/r6_temporal_belief/data/dataset_manifest.json
          - research/r6_temporal_belief/datasets/splits.py
          - configs/research/r6_dataset_manifest.yaml
          - configs/research/r6_label_schema.yaml
          - artifacts/reports/r6_control_anchor/report.md
      - id: r6_checkpoint_G_control_dataset_gate
        phase: phase_r6_0_control_dataset_contract
        group: checkpoint
        status: completed
        quota_risk: low
        expected_codex_window: review_window
        validation_level_required: L5
        actual_validation_level: L5
        real_validation_status: not_applicable
        capability_validation_status: capability_validated_target
        requires:
          - r6_task_001_freeze_control_and_claim_contract
          - r6_task_002_build_replay_data_manifest_and_split_contract
        reviewed_tasks:
          - r6_task_001_freeze_control_and_claim_contract
          - r6_task_002_build_replay_data_manifest_and_split_contract
        goal: 决定 R6 是否可以进入 benchmark 构建阶段。
        evidence_paths:
          - artifacts/reports/r6_control_anchor/report.md
          - research/r6_temporal_belief/data/source_manifest.yaml
          - research/r6_temporal_belief/data/dataset_manifest.json
          - research/r6_temporal_belief/datasets/splits.py
          - configs/research/r6_dataset_manifest.yaml
          - configs/research/r6_label_schema.yaml
          - artifacts/reports/checkpoints/r6_checkpoint_G_control_dataset_gate.md
        minimum_gate_passed: true
        target_gate_passed: true
        stretch_gate_status: passed
        failure_class: none
        decision: accepted_continue
        next_allowed_task:
          on_pass: r6_task_004_implement_hidden_state_labelers_and_baselines
          on_fail_contract: r6_task_002_build_replay_data_manifest_and_split_contract
          on_fail_control_freeze: r6_task_001_freeze_control_and_claim_contract
  - id: phase_r6_1_offline_benchmark
    name: R6 离线隐藏状态基准
