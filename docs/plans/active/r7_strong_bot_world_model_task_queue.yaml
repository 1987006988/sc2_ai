version: 1
document_status: active
queue_role: r7_strong_bot_world_model_queue
activation_rule: "R7 replaces R6 as the active frontier plan after explicit direction reset. R0-R5 remain accepted history and R6 remains historical bounded frontier evidence."
active_next_task: r7_frontier_goal_reached
source_of_truth:
  - docs/foundation/04_research_direction/r7_strong_bot_world_model_decision.md
  - docs/plans/active/R7_STRONG_BOT_WORLD_MODEL_MASTER_PLAN.md
  - docs/experiments/r7_strong_bot_data_protocol.md
  - docs/experiments/r7_world_model_evaluation_protocol.md
superseded_queue: docs/plans/active/r6_frontier_task_queue.yaml
frozen_core_queue: docs/plans/active/research_master_task_queue.yaml
execution_rules:
  checkpoint_every_n_tasks: 3
  checkpoint_failure_blocks_progress: true
  no_weak_bot_frontier_claims: true
  strong_bot_license_must_be_audited: true
  no_model_training_before_teacher_data_materialized: true
  no_online_claim_without_external_validation: true
  no_using_downloaded_bot_performance_as_own_contribution: true
validation_levels:
  L0: documentation_and_classification_only
  L1: static_code_config_and_test_validation
  L2: acquisition_contract_or_dataset_validation
  L3: local_run_or_offline_benchmark_validation
  L4: internal_batch_or_online_intervention_evaluation
  L5: checkpoint_decision
  L6: external_bot_ecosystem_validation
phases:
  - id: phase_r7_0_supersede_r6
    name: R7 reset and history freeze
    objective: stop R6 as the active frontier route, preserve accepted history, and activate the R7 strong-bot world-model line.
    exit_checkpoint: r7_checkpoint_L_r6_supersession_gate
    tasks:
      - id: r7_task_001_supersede_r6_and_freeze_history
        phase: phase_r7_0_supersede_r6
        group: direction_reset
        status: completed
        quota_risk: low
        expected_codex_window: single_session
        validation_level_required: L1
        actual_validation_level: L1
        real_validation_status: not_applicable
        capability_validation_status: not_applicable_direction_reset
        requires: []
        data_source:
          - docs/context/current_status.md
          - docs/handoffs/latest.md
          - docs/plans/active/r6_frontier_task_queue.yaml
          - docs/plans/active/research_master_task_queue.yaml
          - artifacts/reports/checkpoints/checkpoint_F_adaptive_research_gate.md
        goal: mark R7 as the active frontier direction and freeze prior accepted history without rewriting it.
        scope:
          - mark R6 superseded as active frontier
          - create R7 direction files
          - switch current_status to R7
          - preserve R0-R5 and accepted R6 history
        non_goals:
          - no code changes
          - no strong bot download
          - no model training
        files_likely_to_change:
          - docs/foundation/04_research_direction/r7_strong_bot_world_model_decision.md
          - docs/plans/active/R7_STRONG_BOT_WORLD_MODEL_MASTER_PLAN.md
          - docs/plans/active/r7_strong_bot_world_model_task_queue.yaml
          - docs/context/current_status.md
          - docs/handoffs/latest.md
          - README.md
        verification:
          - current_status names the R7 queue
          - R6 is no longer the active frontier queue
          - the frozen core queue is unchanged
        done_criteria:
          - R7 source of truth exists
          - R6 supersession is explicit
          - next active task is r7_task_002_identify_and_rank_strong_bot_candidates
        minimum_gate:
          claim: R7 active direction is established
          pass_condition: R6 is marked superseded as the active frontier and the R7 source-of-truth files exist
        target_gate:
          claim: Codex can no longer accidentally continue R6
          pass_condition: current_status and handoff point to the R7 queue and r7_task_002_identify_and_rank_strong_bot_candidates
        stretch_gate:
          claim: public docs reflect R7 accurately
          pass_condition: README mentions R7 frontier mode without overstating results
        stop_conditions:
          - R6 and R7 both appear active
          - core accepted results are modified or invalidated
        rollback_notes:
          - do not edit checkpoint_E or checkpoint_F conclusions
          - preserve accepted R6 history even though it is no longer the active frontier queue
        evidence_paths:
          - docs/foundation/04_research_direction/r7_strong_bot_world_model_decision.md
          - docs/plans/active/R7_STRONG_BOT_WORLD_MODEL_MASTER_PLAN.md
          - docs/plans/active/r7_strong_bot_world_model_task_queue.yaml
          - docs/context/current_status.md
          - docs/handoffs/latest.md
          - README.md
        failure_class: none
      - id: r7_task_002_identify_and_rank_strong_bot_candidates
        phase: phase_r7_0_supersede_r6
        group: candidate_discovery
        status: completed
        quota_risk: medium
        expected_codex_window: single_session_to_multi_session
        validation_level_required: L2
        actual_validation_level: L2
        real_validation_status: not_applicable
        capability_validation_status: completed_candidate_registry
        requires:
          - r7_task_001_supersede_r6_and_freeze_history
        data_source:
          - AI Arena downloadable bots
          - AI Arena house bots
          - AI Arena results and replay feeds
          - DI-star
          - TStarBot-X
          - awesome-sc2-ai
          - SC2EGSet
        goal: identify plausible strong-bot, teacher-data, and comparator candidates.
        scope:
          - create candidate registry
          - record source, license, expected role, and data availability
          - rank candidates by strength, data, license, and intervention feasibility
        non_goals:
          - no downloads
          - no training
          - no online claim
        files_likely_to_change:
          - configs/research/r7_strong_bot_candidates.yaml
          - artifacts/reports/r7_strong_bot_acquisition/candidate_registry.md
          - docs/handoffs/latest.md
        verification:
          - each candidate records source and intended role
          - accepted candidates do not have unknown license state
          - intervention and data feasibility are documented
        done_criteria:
          - at least three candidates are recorded or a blocker is documented
          - at least one preferred candidate role is assigned
        minimum_gate:
          claim: candidate discovery is usable
          pass_condition: at least one plausible substrate or teacher candidate is identified with source and license path
        target_gate:
          claim: candidate ranking can guide acquisition
          pass_condition: candidates are ranked by strength, data availability, license, and intervention feasibility
        stretch_gate:
          claim: multiple paths are available
          pass_condition: at least one substrate candidate and one teacher-data candidate are identified separately
        stop_conditions:
          - no candidate has auditable license
          - no candidate can run or provide data
        rollback_notes:
          - do not download or vendor code until license is checked
        evidence_paths:
          - configs/research/r7_strong_bot_candidates.yaml
          - artifacts/reports/r7_strong_bot_acquisition/candidate_registry.md
        failure_class: none
      - id: r7_checkpoint_L_r6_supersession_gate
        phase: phase_r7_0_supersede_r6
        group: checkpoint
        status: completed
        quota_risk: low
        expected_codex_window: review_window
        validation_level_required: L5
        actual_validation_level: L5
        real_validation_status: not_applicable
        capability_validation_status: capability_validated_target
        requires:
          - r7_task_001_supersede_r6_and_freeze_history
          - r7_task_002_identify_and_rank_strong_bot_candidates
        reviewed_tasks:
          - r7_task_001_supersede_r6_and_freeze_history
          - r7_task_002_identify_and_rank_strong_bot_candidates
        goal: decide whether R7 can proceed into strong bot acquisition and local audit.
        evidence_paths:
          - docs/context/current_status.md
          - docs/handoffs/latest.md
          - configs/research/r7_strong_bot_candidates.yaml
          - artifacts/reports/r7_strong_bot_acquisition/candidate_registry.md
          - artifacts/reports/checkpoints/r7_checkpoint_L_r6_supersession_gate.md
        minimum_gate_passed: true
        target_gate_passed: true
        stretch_gate_status: passed
        failure_class: none
        decision: accepted_continue
        next_allowed_task:
          on_pass: r7_task_004_acquire_and_license_audit_selected_strong_bot
          on_fail_direction_conflict: r7_task_001_supersede_r6_and_freeze_history
          on_fail_no_candidate: r7_task_002_identify_and_rank_strong_bot_candidates
  - id: phase_r7_1_strong_bot_acquisition
    name: Strong bot acquisition, license audit, and local run
    objective: acquire and audit strong bot or teacher sources before model work.
    exit_checkpoint: r7_checkpoint_M_strong_bot_gate
