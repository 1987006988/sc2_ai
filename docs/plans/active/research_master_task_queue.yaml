    - 不再出现 attack/defend 在 own_army_count=0 时被误认为 capability 的路径
    - 生产与 rally 的事件记录可支持后续 real probe
    done_criteria:
    - 第一支 army 的前提链条被结构化实现
    - rally 只在真实 army 存在时触发
    - 生产死锁原因可被明确记录
    minimum_gate:
      claim: combat-unit production 具备可 probe 的实现
