    goal: 在真实 SC2 中验证 opening build chain 是否真的到达 Gateway ready，并且公平暴露 gas / cyber
      机会窗口。
    scope:
    - 使用 baseline_playable 配置运行 real build-chain probe
    - 记录 gateway command、gateway started、gateway ready、assimilator attempt、cyber attempt
      或 stall reason
    - 保持范围严格聚焦于开局 build chain，不提前宣称 army/tactical 成功
    non_goals:
    - 不做 win-rate 结论
    - 不做 adaptive claim
    - 不把单次 run 的 command telemetry 当成 gateway-ready 证据
    files_likely_to_change:
    - evaluation/*
    - artifacts/reports/r1_build_chain_probe/report.md
    - data/logs/evaluation/r1_build_chain_probe/
    verification:
    - 真实 probe 符合 protocol 的有效证据要求
    - 构建相关事件与 replay 可相互印证
    - 若未完成 ready，failure class 必须明确是 insufficient_duration、missing_prerequisite 还是
      logic_failure
    done_criteria:
    - 产生一组有效 real-match artifacts
    - Gateway ready 是否成立被明确判定
    - 早期 tech-chain opportunity 是否成立被明确判定
    minimum_gate:
      claim: Gateway ready 已在公平机会窗口内被真实验证
      pass_condition: 有效 real probe 中出现 gateway ready，或自然结束前给出不可混淆的 blocker classification
    target_gate:
      claim: 早期 gas / cyber opportunity 已被公平暴露
      pass_condition: assimilator attempt 与 cyber attempt 或其显式 stall reason 被记录，并满足
        protocol 的机会窗口要求
    stretch_gate:
      claim: production phase 已经被部分前向验证
      pass_condition: 在不越界宣称 army core 的前提下，出现 first combat-unit command 或明确进入 production-ready
        state
    stop_conditions:
    - 证据无效
    - runtime 时长再次不足
    - Gateway ready 未被验证且 failure class 不清晰
    rollback_notes:
    - invalid evidence 时原样 rerun，不改代码
    - insufficient duration 时修 runtime/eval contract，不误判为 gameplay failure
    - logic failure 时回到 task_004 修 build chain
    evidence_paths:
    - data/logs/evaluation/r1_build_chain_probe/summary.json
    - data/logs/evaluation/r1_build_chain_probe/reallaunch-ab4d1133/match_result.json
    - data/logs/evaluation/r1_build_chain_probe/reallaunch-ab4d1133/telemetry/events.jsonl
