    scope:
    - 把 zealot / stalker 生产从可触发命令提升为真实产出路径
    - 解决 supply、gas、production idle、rally point 这些会阻断第一支军队出现的问题
    - 让 rally 行为只在 army 真实存在时触发，并记录原因
    non_goals:
    - 不做复杂兵种组合
