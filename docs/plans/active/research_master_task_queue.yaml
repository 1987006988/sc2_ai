    - 收集 outcome、duration、build-chain、army、tactical、friendly combat、artifact completeness
      等指标
    - 显式标记 invalid evidence、insufficient duration、prerequisite regression、logic failure
    non_goals:
    - 不做 adaptive claim
    - 不把单局亮点当成 batch 结论
    - 不在 baseline 未稳定前扩大到 broader pool
    files_likely_to_change:
    - data/logs/evaluation/r4_baseline_easy_pool_batch/
    - artifacts/reports/r4_baseline_easy_pool/report.md
    verification:
    - batch 设计与 protocol 一致
    - 每个 run 均能追溯到 code/config provenance
    - 报告必须把 infrastructure、gameplay capability、research contribution 分开写
    done_criteria:
    - 生成完整 baseline batch artifacts
    - Level 1 相关结论可以被 checkpoint 审核
    - dominant failure class 被排序，便于下一任务 repair 或确认
    minimum_gate:
      claim: baseline 已不再是纯诊断脚手架
      pass_condition: batch 中不存在系统性 prerequisite regression，且至少出现一场无争议的真正胜利或极强 near-win
        证据
    target_gate:
      claim: Level 1 playable baseline 具有可接受的重复性
      pass_condition: easy slice 上出现重复 wins 或同等强度的稳定优势证据，足以支撑 checkpoint 做 Level 1
        决策
    stretch_gate:
      claim: 可以准备进入 adaptive research 阶段
      pass_condition: batch 不仅有 outcome，还能证明 baseline 行为已稳定到足以承载 paired adaptive comparison
    stop_conditions:
    - 证据无效
    - 系统性 prerequisite regression
    - batch 结果仍表明 baseline 只是诊断体而非可玩体
    rollback_notes:
    - 若失败来自下游战术问题，回到 task_010
    - 若失败来自 army/production，回到 task_007
    - 若失败来自 evidence invalidation，先原样 rerun，再决定是否 repair
    evidence_paths:
    - data/logs/evaluation/r4_baseline_easy_pool_batch/
    - artifacts/reports/r4_baseline_easy_pool/report.md
    capability_validation_status: pending
  - id: task_014_baseline_repair_or_confirmation
    phase: phase_r4_baseline_outcome_validation
    group: baseline_repair_confirmation
    status: blocked
    quota_risk: high
    expected_codex_window: single_repair_plus_focused_rerun_window
    validation_level_required: L4
    actual_validation_level: none
    data_source:
    - task_013_baseline_easy_pool_batch_evaluation
    - checkpoint_D_tactical_core_gate
    real_validation_status: not_started
    requires:
    - task_013_baseline_easy_pool_batch_evaluation
    goal: 基于 baseline batch 的 dominant failure class，执行一次最高优先级 repair，或在 target 已通过时执行最小必要
      confirmation rerun 以冻结 Level 1 证据。
    scope:
    - 若 task_013 target 未通过，则只修最主要 failure class，不分散到多条支线
    - 若 task_013 target 已通过，则不扩 scope，只做最小 confirmation 以证明结果不是偶发
    - rerun 只覆盖受影响的 opponent/map slice，避免无效扩大样本
    non_goals:
    - 不新增 adaptive behavior
    - 不转向 broader pool
    - 不把 report 写作当成 repair 替代品
    files_likely_to_change:
    - src/sc2bot/runtime/game_loop.py
    - src/sc2bot/managers/macro_manager.py
    - src/sc2bot/managers/tactical_manager.py
    - configs/bot/baseline_playable.yaml
    - data/logs/evaluation/r4_baseline_repair_or_confirmation/
    - artifacts/reports/r4_baseline_repair_or_confirmation/report.md
    verification:
    - repair 或 confirmation 的范围与 task_013 failure class 一一对应
    - rerun 结果与原 batch 可对比
    - 没有引入新的 prerequisite regression
    done_criteria:
    - dominant failure class 被处理或被确认不影响 Level 1 结论
    - 补充证据可以支持 checkpoint_E 做 pass/fail 决策
    - baseline 仍保持 non-adaptive 对照角色的清晰性
    minimum_gate:
      claim: 最高优先级 baseline 风险已被处理
      pass_condition: repair 后的 focused rerun 明确改善 dominant failure class，或 confirmation
        证明原结论稳定
    target_gate:
      claim: Level 1 决策已具备足够稳健性
      pass_condition: repair/confirmation 之后，checkpoint 不再需要额外 large scope 证据就能决定是否接受
        baseline
    stretch_gate:
      claim: baseline 已准备好作为 adaptive paired eval 的 control
      pass_condition: baseline 行为稳定、配置冻结、不会在 paired eval 中继续漂移
    stop_conditions:
    - repair 没有针对 dominant failure class
    - rerun 引入新的 prerequisite regression
    - 为了追求通过而偷偷扩大 scope 或变更多个变量
    rollback_notes:
    - 若 repair 导致 core regression，立即回退到 task_013 前的通过版本并重新定位 failure class
    - 若 confirmation rerun 与原 batch 冲突，取消 Level 1 冻结并继续 baseline repair
    evidence_paths:
    - data/logs/evaluation/r4_baseline_repair_or_confirmation/
    - artifacts/reports/r4_baseline_repair_or_confirmation/report.md
    capability_validation_status: pending
  - id: checkpoint_E_level1_baseline_gate
    phase: phase_r4_baseline_outcome_validation
    group: checkpoint
    status: blocked
    quota_risk: low
    expected_codex_window: review_window
    validation_level_required: L5
    actual_validation_level: none
    data_source:
    - task_013_baseline_easy_pool_batch_evaluation
    - task_014_baseline_repair_or_confirmation
    real_validation_status: not_started
    requires:
    - task_013_baseline_easy_pool_batch_evaluation
    - task_014_baseline_repair_or_confirmation
    goal: 决定 non-adaptive baseline 是否被正式接受为 Level 1 playable core；此 checkpoint 不通过则
      adaptive 研究阶段不得开始。
    scope:
    - 审查 reviewed_tasks 的证据、失败分类与验证级别
    - 决定 accepted_continue、repair_and_rerun、return_to_prior_phase 或 blocked
    - 写回 evidence_paths、failure_class、decision、next_allowed_task
    non_goals:
    - 不新增 gameplay 功能
    - 不用叙述替代证据
    - 不绕过前序门槛直接放行后续阶段
    files_likely_to_change:
    - docs/plans/active/research_master_task_queue.yaml
    - artifacts/reports/checkpoints/
    verification:
    - reviewed_tasks 全部已完成并附带所需证据
    - minimum_gate、target_gate、stretch_gate 的判断依据可追溯
    - decision 与 next_allowed_task 一致
    done_criteria:
    - checkpoint 字段全部写实，不留空泛结论
    - failure_class 被明确记录
    - 若 minimum_gate 未通过，则后续阶段保持 blocked
    minimum_gate:
      claim: baseline 最低接受门槛通过
      pass_condition: batch 证据表明 bot 已从 survival scaffold 进入真实 playable core，且不存在致命
        prerequisite regression
    target_gate:
      claim: Level 1 playable baseline 被接受
      pass_condition: easy slice 上有重复性 outcome 证据与配套 gameplay evidence，可支持 baseline
        作为 adaptive control
    stretch_gate:
      claim: 可以进入 adaptive research 阶段
      pass_condition: checkpoint 认定 baseline 稳定到足以承载 paired evaluation，而不是边跑 paired
        eval 边修 baseline
    stop_conditions:
    - reviewed_tasks 任一任务证据无效
    - 前置阶段 prerequisite regression 被发现
    - capability_validation_status 与证据不一致
    rollback_notes:
    - 若 minimum_gate 未通过，回退到 next_allowed_task.on_fail_* 指向的任务
    - 不得保持后续任务为 pending 可执行状态；必须显式 blocked
    evidence_paths:
    - artifacts/reports/checkpoints/
    capability_validation_status: not_applicable_checkpoint
    reviewed_tasks:
    - task_013_baseline_easy_pool_batch_evaluation
    - task_014_baseline_repair_or_confirmation
    minimum_gate_passed: null
    target_gate_passed: null
    stretch_gate_status: pending
    failure_class: pending
    decision: pending
    next_allowed_task:
      on_pass: task_016_integrate_single_adaptive_gating_layer
      on_fail_minor_instability: task_014_baseline_repair_or_confirmation
      on_fail_tactical_regression: task_010_rewrite_defend_attack_transition_logic
      on_fail_army_regression: task_007_rewrite_combat_unit_production_and_rally_logic
- id: phase_r5_adaptive_research_validation
  name: 单一 adaptive research feature 的真实验证
  objective: 在已接受的 Level 1 baseline 之上，仅引入一个 adaptive gating layer，并用 paired evaluation
    验证其真实行为效应与可归因收益。
  entry_requirements:
  - checkpoint_E_level1_baseline_gate passed
  exit_checkpoint: checkpoint_F_adaptive_research_gate
  tasks:
  - id: task_016_integrate_single_adaptive_gating_layer
    phase: phase_r5_adaptive_research_validation
    group: adaptive_impl
    status: blocked
    quota_risk: high
    expected_codex_window: single_session_to_multi_session
    validation_level_required: L1
    actual_validation_level: none
    data_source:
    - src/sc2bot/managers/strategy_manager.py
    - src/sc2bot/opponent_model/*
    - src/sc2bot/runtime/game_loop.py
    - configs/bot/baseline_playable.yaml
    - configs/bot/adaptive_research.yaml
    - phase1d/phase1e reports
    real_validation_status: not_started
    requires:
    - checkpoint_E_level1_baseline_gate
    goal: 仅接入一个 research feature：稀疏侦察驱动的在线对手状态推断与时机门控层，并把它真正连到 gameplay gate，而非仅保留
      telemetry tag。
    scope:
    - 允许 adaptive layer 影响 continue_scouting、defensive_posture、first_attack_timing
      这三类门控
    - 保持 control 与 treatment 的代码基线尽量一致，差异集中在 adaptive switch 与必要参数
    - 保留 null / baseline_playable 作为 paired evaluation control
    non_goals:
    - 不新增第二个 research feature
    - 不引入 learned opponent model
    - 不在此阶段重新大修 baseline core
    files_likely_to_change:
    - src/sc2bot/managers/strategy_manager.py
    - src/sc2bot/opponent_model/*
    - src/sc2bot/runtime/game_loop.py
    - configs/bot/baseline_playable.yaml
    - configs/bot/adaptive_research.yaml
    - tests/*
    verification:
    - 静态与最小集成检查能说明 adaptive output 如何进入 gameplay gate
    - control 与 treatment 的唯一差异可审计
    - adaptive layer 不会让 baseline prerequisite regression
    done_criteria:
    - adaptive layer 进入 mainline gameplay path
    - control 与 treatment 配置冻结并可追溯
    - 研究特色仍然只有一个，没有 scope creep
    minimum_gate:
      claim: adaptive layer 已不再是 telemetry-only
      pass_condition: 至少一个 real gameplay gate 由 opponent-state inference 直接控制，而非只写
        response tag
    target_gate:
      claim: paired evaluation 已具备因果可比性
      pass_condition: control 与 treatment 除 adaptive layer 外保持同一 baseline 核心
    stretch_gate:
      claim: 三类允许的时机门控已具备可扩展接口
      pass_condition: continue_scouting、defensive_posture、first_attack_timing 至少两类可被
        adaptive layer 接管而不破坏 baseline
    stop_conditions:
    - adaptive layer 仍然只写 tag 不改 gameplay
    - 一次接入多个研究特色
    - control 与 treatment 同时改 baseline，导致无法归因
    rollback_notes:
    - 若 adaptive 接入破坏 baseline，通过 checkpoint_E 冻结的 control 版本回退
    - 若某一门控接入过重，先只保留一个最可解释的门控再进入 paired eval
    evidence_paths:
    - src/sc2bot/managers/strategy_manager.py
    - src/sc2bot/opponent_model/
    - configs/bot/adaptive_research.yaml
    - tests/
    capability_validation_status: not_applicable_implementation_task
  - id: task_017_null_vs_adaptive_paired_evaluation
    phase: phase_r5_adaptive_research_validation
    group: paired_eval
    status: blocked
    quota_risk: high
    expected_codex_window: multi_run_paired_window
    validation_level_required: L4
    actual_validation_level: none
    data_source:
    - task_016_integrate_single_adaptive_gating_layer
    - configs/bot/baseline_playable.yaml
    - configs/bot/adaptive_research.yaml
    - docs/experiments/real_match_validation_protocol.md
    real_validation_status: not_started
    requires:
    - task_016_integrate_single_adaptive_gating_layer
    - checkpoint_E_level1_baseline_gate
    goal: 在 matched real-match setting 中比较 baseline_playable 与 adaptive_research，验证
      adaptive layer 是否真实改变行为并带来可归因收益。
    scope:
    - 按 protocol 组织 paired evaluation，保持 opponent/map slice 一致
    - 重点比较 continue_scouting、defensive_posture、first_attack_timing 相关行为差异，以及 outcome/robustness
      的方向性变化
    - 所有 paired runs 必须保留完整 provenance 与 failure classification
    non_goals:
    - 不扩展到 broader pool showcase
    - 不把未配对的 anecdotal run 当作研究结论
    - 不在 paired eval 中继续调整 baseline core
    files_likely_to_change:
    - data/logs/evaluation/r5_paired_adaptive_eval/
    - artifacts/reports/r5_paired_adaptive_eval/report.md
    verification:
    - paired design 符合 protocol
    - behavior delta 先于 outcome 解读
    - 若没有行为差异，不得硬写收益结论
    done_criteria:
    - paired artifacts 完整
    - adaptive 是否改变真实行为被明确判定
    - adaptive 是否产生方向性收益被明确判定
    minimum_gate:
      claim: adaptive layer 真实改变了 gameplay behavior
      pass_condition: paired evaluation 中至少一类允许门控出现可重复观察的 control vs treatment 差异
    target_gate:
      claim: adaptive layer 带来可归因收益
      pass_condition: 在 matched slice 上出现 outcome 改善、鲁棒性改善或 failure-class 改善，且该改善与行为差异方向一致
    stretch_gate:
      claim: 研究结论具有跨切片潜力
      pass_condition: 效果在多于一个 opponent race 或 map slice 上保持同方向，或 checkpoint 明确界定其边界
    stop_conditions:
    - 证据无效
    - 没有行为差异
    - 行为差异存在但收益方向不清或伴随 core regression
    rollback_notes:
    - invalid evidence 时原样 rerun
    - 无行为差异时回 task_016 修 adaptive gate，而不是继续扩大样本
    - 若出现 core regression，回退到 checkpoint_E 接受的 baseline control
    evidence_paths:
    - data/logs/evaluation/r5_paired_adaptive_eval/
    - artifacts/reports/r5_paired_adaptive_eval/report.md
    capability_validation_status: pending
  - id: checkpoint_F_adaptive_research_gate
    phase: phase_r5_adaptive_research_validation
    group: checkpoint
    status: blocked
    quota_risk: low
    expected_codex_window: review_window
    validation_level_required: L5
    actual_validation_level: none
    data_source:
    - task_016_integrate_single_adaptive_gating_layer
    - task_017_null_vs_adaptive_paired_evaluation
    real_validation_status: not_started
    requires:
    - task_016_integrate_single_adaptive_gating_layer
    - task_017_null_vs_adaptive_paired_evaluation
    goal: 决定本项目是否已经完成核心 research claim：单一 sparse-scout adaptive layer 在真实 SC2 中被证明能改变行为并带来可归因收益。
    scope:
    - 审查 reviewed_tasks 的证据、失败分类与验证级别
    - 决定 accepted_continue、repair_and_rerun、return_to_prior_phase 或 blocked
    - 写回 evidence_paths、failure_class、decision、next_allowed_task
    non_goals:
    - 不新增 gameplay 功能
    - 不用叙述替代证据
    - 不绕过前序门槛直接放行后续阶段
    files_likely_to_change:
    - docs/plans/active/research_master_task_queue.yaml
    - artifacts/reports/checkpoints/
    verification:
    - reviewed_tasks 全部已完成并附带所需证据
    - minimum_gate、target_gate、stretch_gate 的判断依据可追溯
    - decision 与 next_allowed_task 一致
    done_criteria:
    - checkpoint 字段全部写实，不留空泛结论
    - failure_class 被明确记录
    - 若 minimum_gate 未通过，则后续阶段保持 blocked
    minimum_gate:
      claim: research claim 最低门槛通过
      pass_condition: paired evaluation 证明 adaptive layer 改变了真实行为，且没有破坏 baseline core
    target_gate:
      claim: 核心 research contribution 被接受
      pass_condition: behavior delta 与收益方向一致，足以把本项目从 playable bot 提升为有研究贡献的系统
    stretch_gate:
      claim: 可进入扩展展示而不是继续重做主线
      pass_condition: checkpoint 认定当前证据已足以支撑后续 medium/broader-pool extension 或对外展示整理
    stop_conditions:
    - reviewed_tasks 任一任务证据无效
    - 前置阶段 prerequisite regression 被发现
    - capability_validation_status 与证据不一致
    rollback_notes:
    - 若 minimum_gate 未通过，回退到 next_allowed_task.on_fail_* 指向的任务
    - 不得保持后续任务为 pending 可执行状态；必须显式 blocked
    evidence_paths:
    - artifacts/reports/checkpoints/
    capability_validation_status: not_applicable_checkpoint
    reviewed_tasks:
    - task_016_integrate_single_adaptive_gating_layer
    - task_017_null_vs_adaptive_paired_evaluation
    minimum_gate_passed: null
    target_gate_passed: null
    stretch_gate_status: pending
    failure_class: pending
    decision: pending
    next_allowed_task:
      on_pass: project_core_goal_reached
      on_fail_no_behavior_change: task_016_integrate_single_adaptive_gating_layer
      on_fail_no_causal_benefit: task_017_null_vs_adaptive_paired_evaluation
      on_fail_core_regression: task_010_rewrite_defend_attack_transition_logic
