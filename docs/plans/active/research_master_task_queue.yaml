      pass_condition: 生产逻辑与 supply/gas/rally 条件显式化，且可被测试
    stretch_gate:
      claim: 后续 tactical transition 有稳定输入
      pass_condition: own_army_count、rally state、production health 可作为战术阶段的可靠前置
    stop_conditions:
    - 仍然只能发生产命令而无真实单位
    - rally 在无 army 时被触发
    - 实现破坏 build-chain 已通过的能力
    rollback_notes:
    - 若 production 修复引发 build-chain 回归，回退到 checkpoint_B 通过时的 opening 实现，再做更小粒度改动
    - 若 rally 逻辑引发不稳定，先保守保持 rally，再进入 real probe
    evidence_paths:
    - src/sc2bot/runtime/game_loop.py
    - src/sc2bot/managers/tactical_manager.py
    - src/sc2bot/domain/decisions.py
    - configs/bot/baseline_playable.yaml
    - tests/unit/test_game_loop.py
    - tests/unit/test_tactical_manager.py
    - tests/integration/test_evaluation_config.py
    - artifacts/reports/r2_army_presence_probe/task_007_static_validation.md
