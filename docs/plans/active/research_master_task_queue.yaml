version: 1
document_status: active
owner_role: chief_research_planner
source_of_truth:
- docs/foundation/04_research_direction/research_direction_decision.md
- docs/plans/active/MASTER_RESEARCH_EXECUTION_PLAN.md
- docs/experiments/real_match_validation_protocol.md
active_next_task: task_010_rewrite_defend_attack_transition_logic
execution_rules:
  checkpoint_every_n_tasks: 3
  checkpoint_failure_blocks_progress: true
  phase_skip_allowed: false
  diagnostic_is_capability: false
  task_completed_is_capability_validated: false
  debug_config_allowed_for_capability_claims: false
  adaptive_tasks_require_baseline_gate: checkpoint_E_level1_baseline_gate
validation_levels:
  L0: documentation_and_classification_only
  L1: static_code_config_and_test_validation
  L2: dry_run_integration_without_gameplay_claim
  L3: single_valid_real_sc2_probe
  L4: real_sc2_batch_or_paired_evaluation
  L5: phase_decision_backed_by_L3_or_L4_evidence
historical_start_state:
  infrastructure_status: accepted_phase_a
  legacy_phase_b_status: diagnostic_only_not_level1
  duration_window_status: revalidated_once_in_phase_b_r
  opponent_model_status: telemetry_validated_gameplay_effect_unvalidated
  current_entry_phase: phase_r0_execution_freeze
phases:
- id: phase_r0_execution_freeze
  name: 研究方向与验证契约冻结
  objective: 冻结新的主研究方向、任务分类口径、验证协议与配置角色，阻断 legacy Phase B 式的误验收继续发生。
  entry_requirements: []
  exit_checkpoint: checkpoint_A_start_gate
  tasks:
  - id: task_001_lock_research_direction_and_repo_reclassification
    phase: phase_r0_execution_freeze
    group: direction_and_truth_source
    status: completed
    quota_risk: low
    expected_codex_window: single_session
    validation_level_required: L1
    actual_validation_level: L1
    data_source:
    - README.md
    - AGENTS.md
    - docs/handoffs/latest.md
    - docs/context/current_status.md
    - docs/context/validated_findings.md
    - docs/context/open_hypotheses.md
    - docs/plans/active/*
    - artifacts/reports/*
    real_validation_status: not_applicable
    requires: []
    goal: 将仓库当前事实重新分类为 infrastructure、gameplay capability、research contribution，并冻结新的主研究方向。
    scope:
    - 落盘 research_direction_decision.md
    - 落盘 retain_rewrite_drop_matrix.md
    - 在主计划中写清 legacy Phase A、旧 Phase B、Phase B-R 的地位
    non_goals:
    - 不改 gameplay 代码
    - 不跑真实 SC2
    - 不宣称任何新能力已经被验证
    files_likely_to_change:
    - docs/foundation/04_research_direction/research_direction_decision.md
    - docs/foundation/04_research_direction/retain_rewrite_drop_matrix.md
    - docs/plans/active/MASTER_RESEARCH_EXECUTION_PLAN.md
    verification:
    - 文档内部结论与仓库现状一致
    - 明确写出保留并重构
    - 明确主研究特色只保留一个
    done_criteria:
    - 三份核心文档已落盘
    - legacy 资产分类清晰
    - 没有把 diagnostic 写成 capability validated
    minimum_gate:
      claim: 新的研究方向与项目分类已经冻结
      pass_condition: 主方向、主研究问题、当前真实进度、禁止跑偏项全部写清
    target_gate:
      claim: source of truth 已从旧散乱计划收敛到新主计划
      pass_condition: 新文件可单独驱动后续执行，不依赖旧 Phase B 叙述
    stretch_gate:
      claim: 仓库历史资产有明确迁移矩阵
      pass_condition: 每类资产均包含保留原因、重写原因、风险、迁移建议
    stop_conditions:
    - 文档互相矛盾
    - 旧计划仍被默认视为主线
    - research feature 数量超过一个
    rollback_notes:
    - 本任务是文档冻结任务，不涉及代码回滚
    - 若内容发现与仓库事实不一致，直接修正文档，不进入后续阶段
    evidence_paths:
    - docs/foundation/04_research_direction/research_direction_decision.md
    - docs/foundation/04_research_direction/retain_rewrite_drop_matrix.md
    - docs/plans/active/MASTER_RESEARCH_EXECUTION_PLAN.md
    capability_validation_status: not_applicable_document_task
  - id: task_002_lock_runtime_eval_contract_and_config_roles
    phase: phase_r0_execution_freeze
    group: validation_contract
    status: completed
    quota_risk: medium
    expected_codex_window: single_session_plus_dry_run
    validation_level_required: L2
    actual_validation_level: L2
    data_source:
    - docs/experiments/real_match_validation_protocol.md
    - configs/bot/debug.yaml
    - configs/bot/phase_b_revalidation_gameplay.yaml
    - evaluation/*
    - src/sc2bot/runtime/*
    - docs/handoffs/latest.md
    real_validation_status: not_applicable
    requires:
    - task_001_lock_research_direction_and_repo_reclassification
    goal: 冻结 runtime 与 evaluation contract，明确 debug、baseline_playable、adaptive_research
      三类配置角色，禁止再用短窗口 debug 配置做 capability claim。
    scope:
    - 为 baseline_playable 与 adaptive_research 明确配置命名与用途
    - 在评测输出中强制记录 code/config provenance、run class、validation class
    - 保证 run_match 与 runtime.max_game_loop 的关系对 capability eval 可审计
    non_goals:
    - 不新增 gameplay 行为
    - 不跑 baseline batch
    - 不把 dry-run 当成 gameplay evidence
    files_likely_to_change:
    - docs/experiments/real_match_validation_protocol.md
    - configs/bot/debug.yaml
    - configs/bot/baseline_playable.yaml
    - configs/bot/adaptive_research.yaml
    - configs/bot/phase_b_revalidation_gameplay.yaml
    - evaluation/*
    verification:
    - 静态检查所有 capability eval 不再指向 debug.yaml
    - dry-run 输出必须包含 config snapshot 与 validation class
    - 文档与配置命名一致
    done_criteria:
    - debug 配置被明确限制为 debug_only
    - baseline_playable 与 adaptive_research 的角色清晰
    - 评测 artifact 强制包含 provenance 字段
    minimum_gate:
      claim: 配置角色冻结完成
      pass_condition: debug_only、baseline_playable、adaptive_research 三类角色明确且无歧义
    target_gate:
      claim: 评测契约冻结完成
      pass_condition: 评测输出能记录 code hash、config snapshot、validation class、run class
    stretch_gate:
      claim: dry-run 入口可用于验证 contract 完整性
      pass_condition: 至少一条 dry-run 路径可输出完整 provenance，而不冒充 gameplay evidence
    stop_conditions:
    - capability eval 仍可引用 debug.yaml
    - config 命名与文档不一致
    - 评测 artifact 缺少 provenance 或 validation class
    rollback_notes:
    - 保留 phase_b_revalidation_gameplay.yaml 作为过渡回退配置，直到 baseline_playable.yaml 成为唯一主线
    - 若 dry-run 暴露 runner 合同问题，先修 evaluation，不得跳去 real gameplay probe
    evidence_paths:
    - docs/experiments/real_match_validation_protocol.md
    - configs/bot/debug.yaml
    - configs/bot/baseline_playable.yaml
    - configs/bot/adaptive_research.yaml
    - configs/bot/phase_b_revalidation_gameplay.yaml
    - configs/evaluation/validation_contract_dry_run.yaml
    - data/logs/evaluation/validation_contract_dry_run/validation_contract_dry_run/summary.json
    - data/logs/evaluation/validation_contract_dry_run/validation_contract_dry_run/dryrun-853a303c/match_result.json
    capability_validation_status: not_applicable_document_and_integration_task
  - id: checkpoint_A_start_gate
    phase: phase_r0_execution_freeze
    group: checkpoint
    status: completed
    quota_risk: low
    expected_codex_window: review_window
    validation_level_required: L5
    actual_validation_level: L5
    data_source:
    - task_001_lock_research_direction_and_repo_reclassification
    - task_002_lock_runtime_eval_contract_and_config_roles
    real_validation_status: not_applicable
    requires:
    - task_001_lock_research_direction_and_repo_reclassification
    - task_002_lock_runtime_eval_contract_and_config_roles
    goal: 确认新的研究方向、验证协议和配置角色已经冻结，允许进入真实 playable core 重建阶段。
    scope:
    - 审查 reviewed_tasks 的证据、失败分类与验证级别
    - 决定 accepted_continue、repair_and_rerun、return_to_prior_phase 或 blocked
    - 写回 evidence_paths、failure_class、decision、next_allowed_task
    non_goals:
    - 不新增 gameplay 功能
    - 不用叙述替代证据
    - 不绕过前序门槛直接放行后续阶段
    files_likely_to_change:
    - docs/plans/active/research_master_task_queue.yaml
    - artifacts/reports/checkpoints/
    verification:
    - reviewed_tasks 全部已完成并附带所需证据
    - minimum_gate、target_gate、stretch_gate 的判断依据可追溯
    - decision 与 next_allowed_task 一致
    done_criteria:
    - checkpoint 字段全部写实，不留空泛结论
    - failure_class 被明确记录
    - 若 minimum_gate 未通过，则后续阶段保持 blocked
    minimum_gate:
      claim: 新方向与验证契约已经可执行
      pass_condition: task_001 与 task_002 完成，且没有遗留的 debug/capability 混用风险
    target_gate:
      claim: 主线 source of truth 已稳定
      pass_condition: 后续 Codex 可仅依赖新方向文件、主计划、协议与队列执行
    stretch_gate:
      claim: 可以进行 build-chain real probe 而不会重演 Phase B 误验收
      pass_condition: checkpoint 审核认定 evidence taxonomy 与 runtime contract 足以支撑后续
        probe
    stop_conditions:
    - reviewed_tasks 任一任务证据无效
    - 前置阶段 prerequisite regression 被发现
    - capability_validation_status 与证据不一致
    rollback_notes:
    - 若 minimum_gate 未通过，回退到 next_allowed_task.on_fail_* 指向的任务
    - 不得保持后续任务为 pending 可执行状态；必须显式 blocked
    evidence_paths:
    - docs/foundation/04_research_direction/research_direction_decision.md
    - docs/foundation/04_research_direction/retain_rewrite_drop_matrix.md
    - docs/plans/active/MASTER_RESEARCH_EXECUTION_PLAN.md
    - docs/experiments/real_match_validation_protocol.md
    - configs/bot/debug.yaml
    - configs/bot/baseline_playable.yaml
    - configs/bot/adaptive_research.yaml
    - configs/evaluation/validation_contract_dry_run.yaml
    - data/logs/evaluation/validation_contract_dry_run/validation_contract_dry_run/summary.json
    - artifacts/reports/checkpoints/checkpoint_A_start_gate.md
    capability_validation_status: not_applicable
    reviewed_tasks:
    - task_001_lock_research_direction_and_repo_reclassification
    - task_002_lock_runtime_eval_contract_and_config_roles
    minimum_gate_passed: true
    target_gate_passed: true
    stretch_gate_status: passed
    failure_class: none
    decision: accepted_continue
    next_allowed_task:
      on_pass: task_004_rebuild_opening_build_chain_logic
      on_fail_contract_incomplete: task_002_lock_runtime_eval_contract_and_config_roles
      on_fail_direction_mismatch: task_001_lock_research_direction_and_repo_reclassification
    actual_game_time_sufficient: not_applicable
- id: phase_r1_build_chain_core
  name: 开局 build chain 可玩化
  objective: 把 legacy Phase B 的 command-level 诊断改造成真实可验收的 opening build chain，至少公平验证
    Gateway ready 与早期 tech-chain opportunity。
  entry_requirements:
  - checkpoint_A_start_gate passed
  exit_checkpoint: checkpoint_B_build_chain_gate
  tasks:
  - id: task_004_rebuild_opening_build_chain_logic
    phase: phase_r1_build_chain_core
    group: build_chain_impl
    status: completed
    quota_risk: medium
    expected_codex_window: single_session_to_multi_session
    validation_level_required: L1
    actual_validation_level: L1
    data_source:
    - src/sc2bot/runtime/game_loop.py
    - src/sc2bot/managers/macro_manager.py
    - src/sc2bot/config/*
    - legacy Phase B artifacts
    - docs/experiments/real_match_validation_protocol.md
    real_validation_status: not_applicable
    requires:
    - checkpoint_A_start_gate
    goal: 将开局经济与 tech 路径从 survival-baseline 风格的零散 safe_* 调用，收敛为可解释、可测试、可验收的 opening
      build chain。
    scope:
    - 明确 worker、pylon、gateway、assimilator、cybernetics core 的前置条件与优先级
    - 为 build stall、supply stall、gas stall、tech stall 记录显式原因
    - 必要时把 gameplay 主线从 runtime 中抽出到可维护的 macro/build controller，但不得为架构洁癖重写半个仓库
    non_goals:
    - 不做扩张经济
    - 不做高级微操
    - 不接入 adaptive behavior
    - 不做 multi-race
    files_likely_to_change:
    - src/sc2bot/runtime/game_loop.py
    - src/sc2bot/managers/macro_manager.py
    - src/sc2bot/config/*
    - tests/*
    verification:
    - 静态测试与最小集成检查可以解释 build-chain 状态转移
    - build stall 原因可被日志或事件直接定位
    - 代码不会因为重构失去现有真实运行入口
    done_criteria:
    - 存在一个清晰的 opening build-chain 控制路径
    - Gateway ready 与 tech-chain 前置不再仅依赖 command telemetry 推断
    - 为真实 probe 提供可读的状态与失败原因
    minimum_gate:
      claim: 开局 build-chain 逻辑已经具备可 probe 的结构化实现
      pass_condition: 静态与最小集成检查可区分 build command、build started、build ready、stall reason
    target_gate:
      claim: 代码已为真实 build-chain probe 做好准备
      pass_condition: opening path 覆盖 gateway、gas、cyber 前置，且不再只是一串松散 side effects
    stretch_gate:
      claim: 后续 production path 有可扩展接口
      pass_condition: build-chain 状态可被后续 combat-unit production 复用，不需要再次大改 opening
        结构
    stop_conditions:
    - 重构破坏现有 real-match 启动
    - build-chain 仍然无法区分 ready 与 command-only
    - 为追求架构整洁而拖慢 capability 修复
    rollback_notes:
    - 若重构导致启动回归，先回退到能跑的 runtime 基线，再做增量改造
    - 保留 phase_b_revalidation_gameplay 作为临时回退配置，直到 baseline_playable 配置与实现稳定
    evidence_paths:
    - src/sc2bot/runtime/game_loop.py
    - tests/unit/test_game_loop.py
    - tests/unit/test_tactical_manager.py
    - tests/unit/test_build_progression_contract.py
    - tests/integration/test_evaluation_config.py
    - artifacts/reports/r1_build_chain_probe/task_004_static_validation.md
    capability_validation_status: not_applicable_implementation_task
  - id: task_005_real_build_chain_probe
    phase: phase_r1_build_chain_core
    group: build_chain_probe
    status: completed
    quota_risk: medium
    expected_codex_window: single_probe_window
    validation_level_required: L3
    actual_validation_level: L3
    data_source:
    - task_004_rebuild_opening_build_chain_logic
    - configs/bot/baseline_playable.yaml
    - docs/experiments/real_match_validation_protocol.md
    - evaluation/*
    real_validation_status: completed_valid_real_sc2_probe
