        - Add `to_dict()`.
        - Keep null model output compatible.
      non_goals:
        - Do not implement rule-based risk rules.
        - Do not integrate telemetry.
      files_likely_to_change:
        - src/sc2bot/opponent_model/interface.py
        - src/sc2bot/opponent_model/null_model.py
        - tests/unit/test_opponent_model_interface.py
        - docs/handoffs/latest.md
      verification:
        - python -m pytest tests/unit/test_opponent_model_interface.py
      done_criteria:
        - Prediction object serializes all fields.
        - Null baseline remains zero-risk and prediction-only.
      stop_conditions:
        - Interface change requires broad manager refactor.
      rollback_notes:
        - Revert interface fields and test expectations.

    - id: task_5_rule_based_opponent_model_v0
