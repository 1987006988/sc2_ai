        - data/logs/evaluation/phase1d_task6b_probe/reallaunch-f4b16b51/match_result.json
        - data/logs/evaluation/phase1d_task6b_probe/reallaunch-f4b16b51/match.SC2Replay
        - data/logs/evaluation/phase1d_task6b_probe/reallaunch-f4b16b51/telemetry/events.jsonl
      requires:
        - task_6a_opponent_prediction_telemetry_dry_path
      goal: Prove real SC2 local match telemetry contains `opponent_prediction`.
      scope:
        - Run one minimal real local match, preferably with the rule_based bot config.
        - Inspect the real match `telemetry/events.jsonl`.
        - Confirm an event with `event_type = opponent_prediction` exists.
        - Confirm payload contains `opponent_model_mode`, `prediction`, `prediction_mode`, `signals`, `rush_risk`, `tech_risk`, and `confidence`.
        - Record the real match output directory in `evidence_paths`.
      non_goals:
        - Do not build a feature extractor.
        - Do not run a batch.
        - Do not generate a report.
        - Do not change gameplay.
        - Do not tune rule-based model rules.
        - Do not execute task_7.
      files_likely_to_change:
        - docs/plans/active/phase1d_task_queue.yaml
        - docs/handoffs/latest.md
        - data/logs/evaluation/
      verification:
        - Run one real local match through the project runner with `opponent_model.mode = rule_based`.
        - Inspect `telemetry/events.jsonl` for `event_type = opponent_prediction`.
        - Confirm required payload fields are present.
      done_criteria:
        - "`actual_validation_level` is updated to L3."
        - "`data_source` is updated to `new real match telemetry`."
        - "`evidence_paths` includes the real match output directory and telemetry file."
      stop_conditions:
        - Real SC2 launch fails repeatedly.
        - Match completes but telemetry file is missing.
        - Telemetry exists but no `opponent_prediction` event is recorded.
      rollback_notes:
        - Keep code unchanged; leave task pending or blocked with the failed output directory recorded.

    - id: task_7_feature_extractor_single_match
      status: completed
      quota_risk: low
      expected_codex_window: one_plus_window
      max_scope_files: 4
      validation_level_required: L2
      actual_validation_level: L2
