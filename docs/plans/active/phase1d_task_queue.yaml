    - id: task_11c_real_2x2_ablation_batch
      status: completed
      quota_risk: high
      expected_codex_window: one_plus_window
      max_scope_files: 4
      validation_level_required: L3
      actual_validation_level: L3
      data_source: new real match telemetry
      real_validation_status: validated
      evidence_paths:
        - data/logs/evaluation/phase1d_ablation_opponent_model/summary.json
        - data/logs/evaluation/phase1d_ablation_opponent_model/reallaunch-3619df30/
        - data/logs/evaluation/phase1d_ablation_opponent_model/reallaunch-71c37762/
        - data/logs/evaluation/phase1d_ablation_opponent_model/reallaunch-10906834/
