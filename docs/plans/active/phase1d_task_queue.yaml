queue:
  name: phase1d_opponent_modeling_ablation_v0
  execution_mode: manual_trigger_only
  validation_levels:
    L0: "static/code check: files, interfaces, and configs exist"
    L1: "unit test: synthetic input or fake observation verifies code logic"
    L2: "dry telemetry: dry path can write telemetry"
    L3: "real telemetry: real SC2 local match contains target telemetry"
  quota_policy:
    expected_codex_window: one_plus_window
    one_task_per_trigger: true
    avoid_scope_expansion: true
    run_only_task_verification: true
    scheduler_available: false
  forbidden_scope:
    - SMAC
    - LLM replay summary
    - world-model-lite
    - replay imitation learning
    - complex build order
    - army production
    - expansion
  trigger_rules:
    - Read this queue.
    - "Find the first task with `status: in_progress`; otherwise find the first task with `status: pending` whose `requires` entries are completed."
    - Execute only that one task.
    - Run only that task's verification.
    - Update this queue status and validation fields.
    - Update `docs/handoffs/latest.md`.
    - Stop.
  tasks:
    - id: task_0_create_master_plan_and_queue
      status: completed
      quota_risk: low
      expected_codex_window: one_plus_window
      max_scope_files: 4
      validation_level_required: L0
      actual_validation_level: L0
      data_source: static/code only
      real_validation_status: not_required
      evidence_paths:
        - docs/plans/active/MASTER_PLAN_interview_demo_v0.md
        - docs/plans/active/phase1d_opponent_modeling_ablation_v0.md
        - docs/plans/active/phase1d_task_queue.yaml
        - docs/plans/active/phase1d_manual_trigger.md
      requires: []
      goal: Create or refresh the Phase 1D master/queue/manual-trigger planning files.
      scope:
        - Ensure the interview demo master plan exists.
        - Ensure the Phase 1D plan exists.
        - Rewrite this queue using quota-safe manual-trigger tasks.
        - Add manual trigger instructions.
        - Update handoff with current queue status.
      non_goals:
        - Do not implement Phase 1D code.
        - Do not run real SC2.
        - Do not start task 1.
      files_likely_to_change:
        - docs/plans/active/MASTER_PLAN_interview_demo_v0.md
        - docs/plans/active/phase1d_opponent_modeling_ablation_v0.md
        - docs/plans/active/phase1d_task_queue.yaml
        - docs/plans/active/phase1d_manual_trigger.md
        - docs/handoffs/latest.md
      verification:
        - Confirm queue YAML parses.
        - Confirm first pending task is `task_1_config_schema_only`.
      done_criteria:
        - Queue is split into quota-safe tasks.
        - Manual-trigger instructions exist.
        - Handoff states there is no scheduler and next task is task 1.
      stop_conditions:
        - Queue cannot be parsed.
        - Required plan files are missing and cannot be created.
      rollback_notes:
        - Restore the previous queue file from version control or recreate it from handoff notes.

    - id: task_1_config_schema_only
      status: completed
      quota_risk: low
      expected_codex_window: one_plus_window
      max_scope_files: 6
      validation_level_required: L1
      actual_validation_level: L1
      data_source: synthetic unit test
      real_validation_status: not_required
      evidence_paths:
        - tests/unit/test_config_loader.py
        - configs/bot/opponent_model_null.yaml
        - configs/bot/opponent_model_rule_based.yaml
        - configs/evaluation/phase1d_ablation_opponent_model.yaml
      requires:
        - task_0_create_master_plan_and_queue
      goal: Add Phase 1D config schema and minimal ablation config files without runtime behavior.
      scope:
        - Add supply sustain config fields to schema/loader.
        - Add null and rule_based bot configs.
        - Add Phase 1D ablation evaluation config.
        - Keep old `bot_config` smoke config compatible.
      non_goals:
        - Do not update runtime pylon behavior.
        - Do not update opponent model rules.
        - Do not run real SC2.
      files_likely_to_change:
        - src/sc2bot/config/schema.py
        - src/sc2bot/config/loader.py
        - configs/bot/opponent_model_null.yaml
        - configs/bot/opponent_model_rule_based.yaml
        - configs/evaluation/phase1d_ablation_opponent_model.yaml
        - tests/unit/test_config_loader.py
      verification:
        - python -m pytest tests/unit/test_config_loader.py
      done_criteria:
        - New configs load.
        - Existing default/debug configs still load.
        - No runtime behavior changes are included.
      stop_conditions:
        - Loader changes require broader config refactor.
        - More than max_scope_files are needed.
      rollback_notes:
        - Revert config schema/loader changes and remove new config files.

    - id: task_2_supply_sustain_telemetry_scaffold
      status: completed
      quota_risk: low
      expected_codex_window: one_plus_window
      max_scope_files: 5
      validation_level_required: L1
      actual_validation_level: L1
      data_source: synthetic unit test
      real_validation_status: not_required
      evidence_paths:
        - tests/unit/test_game_loop.py
      requires:
        - task_1_config_schema_only
      goal: Add telemetry scaffolding/helpers for supply sustain without issuing build commands.
      scope:
        - Add structured supply sustain telemetry helper.
        - Record skipped reasons in dry/safe paths where no build is attempted.
        - Add focused tests for event payload shape if feasible.
      non_goals:
        - Do not place pylons.
        - Do not call python-sc2 build APIs.
        - Do not run real SC2.
      files_likely_to_change:
        - src/sc2bot/runtime/game_loop.py
        - tests/unit/test_game_loop.py
        - docs/handoffs/latest.md
      verification:
        - python -m pytest tests/unit/test_game_loop.py
      done_criteria:
        - Supply sustain telemetry payloads are structured.
        - No gameplay actions are added.
      stop_conditions:
        - Requires real python-sc2 action calls.
        - Touches unrelated manager behavior.
      rollback_notes:
        - Remove telemetry helper and associated tests.

    - id: task_3_protoss_pylon_sustain_minimal
      status: completed
      quota_risk: medium
      expected_codex_window: one_plus_window
      max_scope_files: 5
      validation_level_required: L1
      actual_validation_level: L1
      data_source: synthetic unit test; prior real match telemetry available
      real_validation_status: prior_evidence_available_not_current_run
      evidence_paths:
        - tests/unit/test_game_loop.py
        - data/logs/evaluation/phase1d_single_rule_based/reallaunch-b1f5139f/telemetry/events.jsonl
      requires:
        - task_2_supply_sustain_telemetry_scaffold
      goal: Implement the smallest Protoss pylon sustain behavior.
      scope:
        - Trigger when supply is near cap.
        - Safely skip no worker, no minerals, pending pylon, no townhall, or placement failure.
        - Issue pylon build command when placement succeeds.
        - Record attempt/success/failure/skip telemetry.
      non_goals:
        - Do not add gateway, gas, army production, expansion, or full build order.
        - Do not change opponent-model behavior.
      files_likely_to_change:
        - src/sc2bot/runtime/game_loop.py
        - tests/unit/test_game_loop.py
        - docs/handoffs/latest.md
      verification:
        - python -m pytest tests/unit/test_game_loop.py tests
      done_criteria:
        - Runtime handles all skip/failure cases without crashing.
        - Pylon sustain is config-gated.
      stop_conditions:
        - Pylon placement requires complex placement search.
        - Real SC2 validation becomes necessary to proceed.
      rollback_notes:
        - Disable `supply_sustain` in configs or revert runtime pylon calls.

    - id: task_4_opponent_prediction_dataclass
      status: completed
      quota_risk: low
      expected_codex_window: one_plus_window
      max_scope_files: 4
      validation_level_required: L1
      actual_validation_level: L1
      data_source: synthetic unit test
