        - tests/unit/test_feature_extractor.py
        - docs/handoffs/latest.md
      verification:
        - python -m pytest tests/unit/test_feature_extractor.py
        - Run or exercise the extractor against the real match directory recorded by task_6b.
      done_criteria:
        - Single-match extraction returns all requested keys.
        - Missing fields do not crash.
        - Acceptance evidence uses real match telemetry from task_6b.
      stop_conditions:
        - Requested keys cannot be derived from real match result or telemetry.
        - task_6b has not produced real `opponent_prediction` telemetry.
      rollback_notes:
        - Remove extractor module and focused tests.

    - id: task_8_feature_extractor_batch
      status: completed
      quota_risk: low
      expected_codex_window: one_plus_window
      max_scope_files: 4
      validation_level_required: L2
