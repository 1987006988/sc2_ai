phase: "Phase A: Ladder Infrastructure & Scalable Real-Match Dataset"
status: active
created_at: "2026-04-22"
manual_trigger: "docs/plans/active/phase_a_manual_trigger.md"
parent_plan: "docs/plans/active/phase_a_ladder_infra_dataset.md"
roadmap: "docs/plans/active/ladder_competitive_adaptive_sc2_bot_plan.md"

validation_levels:
  L0: "static doc/config exists"
  L1: "schema/unit/config validation"
  L2: "dry-run / package dry-run / no real SC2"
  L3: "real SC2 local match evidence"

phase_layers:
  A1_infrastructure_gate:
    purpose: "Prove runner, artifact contract, manifest, package dry-run, real single-match probe, real 4-match smoke, and failure accounting work."
    note: "A1 is an infrastructure gate only. It is not a baseline dataset and cannot close Phase A."
  A2_baseline_real_match_dataset_v0:
    purpose: "Collect a versioned baseline real-match dataset large enough to support future Phase B/C/D iteration."
    target_size: "24-48 real matches"
    note: "A2 establishes the reusable data collection loop. It does not prove bot strength by itself."

data_scale_strategy:
  probe: "1 match; validates single-match chain only."
  smoke: "4 matches; validates multi-match runner stability only."
  baseline_v0: "24-48 matches; establishes the baseline real-match dataset."
  evaluation_v1: "50-100 matches; supports capability evaluation."
  opponent_pool_eval: "100+ matches; supports showcase and research comparisons."
  training_learning_dataset: "Hundreds to thousands of matches; future input for learned opponent model, combat predictor, and imitation modules."

real_match_first_rules:
  - "Unit tests only prove code logic."
  - "Dry-run only proves orchestration flow."
  - "A real match is required to prove gameplay behavior."
  - "Multi-match batch runs are required to prove stability."
  - "Opponent-pool evaluation is required for meaningful showcase value."
  - "Reports must separate synthetic evidence, dry evidence, and real match evidence."
  - "Dry-run conclusions must not be packaged as real capability claims."
  - "Every real match task must output evidence paths."
  - "Every task must fit one Plus 5-hour quota window; if scope expands, mark split_required."

phase_a_closeout_requirements:
  - "A1 infrastructure gate is completed: tasks 1-7 are completed or documented with accepted blockers."
  - "task_4_real_single_match_probe reaches L3."
  - "task_5_real_multi_match_smoke reaches L3."
  - "task_6_failure_accounting_summary uses task_5 real match output as L3 data source."
  - "A2 baseline dataset plan is completed."
  - "Baseline dataset contains at least 24 real matches, or a documented exception explains why the current dataset is below 24."
  - "task_8e_merge_baseline_dataset_manifest uses real baseline chunk outputs."
  - "task_8f_dataset_quality_report uses real baseline dataset outputs."
  - "task_8g_scalable_collection_command is completed."
  - "Reports state that Phase A does not prove bot strength."

